server:
  port: 8080

spring:
  profiles:
    active: dev

  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 2GB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto

tencent:
  cos:
    enabled: ${TENCENT_COS_ENABLED:false}
    secret-id: ${TENCENT_COS_SECRET_ID:}
    secret-key: ${TENCENT_COS_SECRET_KEY:}
    bucket: ${TENCENT_COS_BUCKET:}
    region: ${TENCENT_COS_REGION:ap-beijing}
    endpoint: ${TENCENT_COS_ENDPOINT:}
    quota-bytes: ${TENCENT_COS_QUOTA_BYTES:21474836480}
    read-url-expire-hours: ${TENCENT_COS_READ_URL_EXPIRE_HOURS:24}
    upload-credential-expire-seconds: ${TENCENT_COS_UPLOAD_CREDENTIAL_EXPIRE_SECONDS:1800}

logging:
  level:
    root: INFO
    com.dianjinshou: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [%X{traceId}] - %msg%n'
